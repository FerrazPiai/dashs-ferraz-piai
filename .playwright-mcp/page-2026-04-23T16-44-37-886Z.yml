                - heading "Resumo Executivo" [level=2] [ref=e1607]
              - generic [ref=e1608]:
                - generic [ref=e1609]: Kickoff bem documentado em conteúdo, mas com evidências incompletas para auditoria integral da fase
                - button [expanded] [ref=e1610] [cursor=pointer]:
                  - img [ref=e1611]
            - paragraph [ref=e1615]: Os materiais recebidos trazem conteúdo estratégico relevante e suficiente para uma avaliação parcial da fase, principalmente por meio de uma transcrição extensa do kickoff com contexto de negócio, diferenciais, dores, objeções, canais, persona, fluxo comercial e próximos passos. Porém, a auditoria não pode ser considerada completa porque a plataforma de reunião falhou na extração e os materiais de slides e transcrição parecem ser essencialmente o mesmo conteúdo resumido/anotado, sem validação cruzada por gravação, ata formal ou apresentação original. Ainda assim, há evidência suficiente para concluir que o cliente demonstrou clareza sobre seu negócio, boa abertura estratégica e dores reais de posicionamento, funil e geração de demanda qualificada.
          - generic [ref=e1616]:
            - generic [ref=e1617]:
