                  - heading "Resumo Executivo" [level=2] [ref=e2176]
                - generic [ref=e2177]:
                  - generic [ref=e2178]: Diagnóstico robusto, consultivo e bem conectado ao momento real do cliente.
                  - button [expanded] [ref=e2179] [cursor=pointer]:
                    - img [ref=e2607]
              - generic [ref=e2183]:
                - heading "Momento do cliente" [level=4] [ref=e2184]
                - text: O
                - strong [ref=e2185]: Instituto Zayti / Zite
                - text: ", liderado por"
                - strong [ref=e2186]: Dr. Marcelo Sech
                - text: ", está em um ponto de transição entre autoridade clínica já percebida e maturidade digital ainda em construção. A conversa mostra um negócio de"
                - strong [ref=e2187]: ticket alto
                - text: ", com proposta de valor sofisticada e ambição de crescimento, mas que ainda depende de estruturar melhor aquisição, conteúdo, ambiente digital e operação comercial para escalar sem gerar gargalo. O cliente demonstra consciência de que há demanda potencial, porém teme acelerar marketing antes de garantir capacidade de atendimento e uma experiência coerente com o posicionamento premium. Esse é um sinal importante: não se trata de um cliente buscando volume a qualquer custo, mas previsibilidade com controle."
                - heading "Principais descobertas" [level=4] [ref=e2188]
                - text: A reunião trouxe achados estratégicos relevantes. O primeiro é a ausência de um
                - strong [ref=e2189]: CRM
                - text: ", tratada corretamente como trava estrutural, porque compromete rastreabilidade, nutrição e leitura de origem dos leads. O segundo é a definição de uma lógica de mídia mais madura, com prioridade para"
                - strong [ref=e2190]: Google Search
                - text: "no fundo de funil antes de ampliar awareness, o que mostra preocupação com intenção de demanda e não apenas com alcance. O terceiro é a leitura de que o ativo orgânico ainda está subaproveitado: perfil novo, sem destaques, bio pouco estratégica, baixa exploração de"
                - strong [ref=e2191]: SEO social
                - text: ", pouca humanização e necessidade clara de vídeo. O quarto é a constatação de que o site institucional não sustenta a ambição comercial atual, especialmente no"
                - strong [ref=e2192]: mobile
                - text: ", justamente onde a equipe afirma que ocorre cerca de"
                - strong [ref=e2193]: 90%
                - text: das conversões.
                - separator [ref=e2194]
                - heading "Dinâmica do diagnóstico da V4" [level=4] [ref=e2195]
                - text: A condução da
                - strong [ref=e2196]: V4
                - text: "foi dividida entre especialidades e isso funcionou bem:"
                - strong [ref=e2197]: Eduardo Perozim
                - text: trouxe racional de performance, benchmark e leitura de funil;
                - strong [ref=e2198]: Diogo de Lima
                - text: "aprofundou redes sociais, criativos, UX e ambiente digital. Há boa sofisticação no fato de o time não vender uma solução única, mas organizar o raciocínio por camadas: tráfego, autoridade, conteúdo, experiência e capacidade de atendimento. Também foi positiva a forma como o time conectou o discurso do cliente com implicações práticas, por exemplo quando a preocupação com agenda e capacidade instalada levou à discussão sobre"
                - strong [ref=e2199]: infoprodutos
                - text: e esteira de monetização. O diagnóstico não ficou só em opinião estética; ele foi ancorado em comportamento de usuário, lógica de funil e impacto em conversão.
                - heading "Riscos e janela de oportunidade" [level=4] [ref=e2200]
                - text: "O principal risco é a operação tentar acelerar aquisição antes de resolver três fundamentos:"
                - strong [ref=e2201]: CRM
                - text: ", experiência mobile e rotina de conteúdo com rosto e autoridade. Outro risco é a marca institucional ainda depender demais da figura do médico sem uma arquitetura clara de distribuição entre perfil pessoal, perfil da clínica e ativos de conversão. Em contrapartida, a janela de oportunidade é forte: há espaço para capturar demanda local qualificada via"
                - strong [ref=e2202]: Google Ads
                - text: ", construir autoridade orgânica com vídeos e collabs, e transformar o Instagram em um filtro de ICP em vez de apenas vitrine. O próximo movimento mais óbvio, estrategicamente, é transformar o diagnóstico em execução priorizada de base: organizar CRM, corrigir ambiente digital e iniciar uma cadência disciplinada de conteúdo e mídia orientada por intenção."
            - generic [ref=e2203]:
              - generic [ref=e2204]:
                - generic [ref=e2205]:
                  - img [ref=e2609]
                  - heading "Análise dos Materiais" [level=2] [ref=e2211]
                - button [expanded] [ref=e2213] [cursor=pointer]:
                  - img [ref=e2614]
              - generic [ref=e2217]:
                - heading "Leitura estratégica da conversa" [level=4] [ref=e2218]
                - text: A reunião revela um cliente intelectualmente aberto, com boa capacidade de absorção, mas que precisa transformar entendimento em cadência operacional.
                - strong [ref=e2219]: Dr. Marcelo Sech
                - text: não reage como alguém que busca validação superficial; ele escuta, pondera capacidade instalada, questiona plataformas e demonstra preocupação com coerência entre crescimento e entrega. Isso sugere um decisor com perfil mais racional do que impulsivo, o que tende a favorecer projetos bem estruturados, mas também pode alongar decisões se a priorização não vier muito clara.
                - heading "Sinais emocionais e de poder" [level=5] [ref=e2220]
                - text: "Há um sinal importante de confiança quando o cliente admite que o volume de informação é grande, mas reconhece valor no diagnóstico em vez de se defender. Quando ele traz a preocupação com agenda e gargalo de atendimento, expõe uma dor real de operação, não apenas uma objeção comercial. Isso desloca a conversa de marketing para modelo de crescimento, elevando o nível consultivo da reunião. Também fica evidente que a autoridade técnica da equipe foi aceita: o cliente faz perguntas de implementação e plataforma, o que indica que já enxerga a"
                - strong [ref=e2221]: V4
                - text: não só como avaliadora, mas como possível executora.
                - separator [ref=e2222]
                - heading "Qualidade do diagnóstico por frente" [level=4] [ref=e2223]
                - text: Na frente de
                - strong [ref=e2224]: mídia paga
                - text: ", o trabalho foi consistente ao contextualizar benchmark, custos e lógica de funil sem prometer números fechados. O destaque para"
                - strong [ref=e2225]: Google Search
                - text: como ponto de partida foi adequado ao contexto de clínica local e serviço de alta intenção, enquanto
                - strong [ref=e2226]: Meta Ads
                - text: apareceu mais como construção de autoridade e remarketing. A menção ao
                - strong [ref=e2227]: TikTok
                - text: foi interessante como canal de pulverização de marca, mas secundária diante da maturidade atual do cliente.
                - paragraph [ref=e2228]:
                  - text: Na frente de
                  - strong [ref=e2229]: social media
                  - text: ", a análise foi mais rica do que apenas estética. Houve leitura de nome de perfil, bio, categoria, geolocalização, destaques, fixados, frequência, distribuição de conteúdo e papel do vídeo na humanização. O ponto mais forte aqui foi a compreensão de que o Instagram deve operar como mecanismo de atração, retenção e filtragem de público, e não apenas como mural institucional."
                - paragraph [ref=e2230]:
                  - text: Na frente de
                  - strong [ref=e2231]: ambientes
                  - text: ", o diagnóstico foi objetivo ao apontar baixa performance, experiência ruim no celular e inadequação do site ao posicionamento premium. A recomendação de mentalidade"
                  - strong [ref=e2232]: mobile first
                  - text: foi coerente com a natureza do tráfego e com o comportamento de conversão descrito. A distinção entre
                  - strong [ref=e2233]: site institucional
                  - text: e
                  - strong [ref=e2234]: landing page
                  - text: também foi bem feita, evitando confusão entre ativo de marca e ativo de performance.
                - heading "Contradições e não ditos" [level=4] [ref=e2235]
                - text: Existe uma tensão implícita entre o desejo de crescer e a prontidão operacional para sustentar esse crescimento. O cliente quer avançar, mas a própria conversa mostra que ainda faltam estrutura comercial, CRM e ambiente preparado para absorver demanda. Outra contradição relevante é a ambição de posicionamento
                - strong [ref=e2236]: high ticket
